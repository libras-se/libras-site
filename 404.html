<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Página não encontrada | Libras.se</title>
  <meta name="description" content="A página que você tentou acessar não foi encontrada." />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #102421;
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .box {
      max-width: 640px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      margin: 0 0 28px;
    }

    a {
      color: #007d68;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main>
    <div class="box">
      <h1>Página não encontrada</h1>
      <p>O endereço acessado não existe ou pode ter sido removido.</p>
      <a href="/">Voltar para a página inicial</a>
    </div>
  </main>
</body>
</html>
